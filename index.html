<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCSO MDT</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
}

header{
background:#1b4332;
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:#161b22;
padding:25px;
border-radius:12px;
text-align:center;
border:1px solid #2d333b;
}

.card h2{
font-size:18px;
margin-bottom:15px;
}

.number{
font-size:42px;
font-weight:bold;
color:#39d353;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:35px;
}

button{
padding:18px;
border:none;
border-radius:10px;
background:#238636;
color:white;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#2ea043;
}
</style>

</head>

<body>

<header>
🚔 BCSO MDT
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>Effectif</h2>
<div class="number">19</div>
</div>

<div class="card">
<h2>En Service</h2>
<div class="number">12</div>
</div>

<div class="card">
<h2>Patrouilles</h2>
<div class="number">5</div>
</div>

<div class="card">
<h2>Rapports</h2>
<div class="number">0</div>
</div>

</div>

<div class="menu">

<button>👮 Effectifs</button>

<button>🔫 Armurerie</button>

<button>🚓 Garage</button>

<button>📄 Rapports</button>

<button>🎓 Formations</button>

<button>⚙️ Administration</button>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCSO MDT</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0b1220;
            color:white;
        }

        header{
            background:#154734;
            padding:20px;
            text-align:center;
            font-size:28px;
            font-weight:bold;
        }

        nav{
            display:flex;
            justify-content:center;
            gap:10px;
            background:#123826;
            padding:15px;
            flex-wrap:wrap;
        }

        nav button{
            background:#1f6f52;
            border:none;
            color:white;
            padding:12px 18px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .container{
            max-width:1200px;
            margin:auto;
            padding:20px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-top:25px;
        }

        .card{
            background:#182235;
            padding:25px;
            border-radius:12px;
            text-align:center;
        }

        .number{
            font-size:40px;
            color:#46d37d;
            margin-top:10px;
        }

        table{
            width:100%;
            margin-top:30px;
            border-collapse:collapse;
            background:white;
            color:black;
        }

        th{
            background:#14503d;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            border-bottom:1px solid #ddd;
        }
    </style>
</head>

<body>

<header>
🚔 BCSO MDT
</header>

<nav>
<button>Dashboard</button>
<button>Effectifs</button>
<button>Armurerie</button>
<button>Véhicules</button>
<button>Formations</button>
<button>Administration</button>
</nav>

<div class="container">

<div class="cards">

<div class="card">
Effectif
<div class="number">19</div>
</div>

<div class="card">
État-Major
<div class="number">4</div>
</div>

<div class="card">
Command Staff
<div class="number">1</div>
</div>

<div class="card">
Supervisor Staff
<div class="number">4</div>
</div>

</div>

<table>

<tr>
<th>Nom</th>
<th>Badge</th>
<th>Grade</th>
<th>Disponibilité</th>
</tr>

<tr>
<td>Tom Benali</td>
<td>301</td>
<td>Undersheriff</td>
<td>Disponible</td>
</tr>

</table>

</div>

</body>
</html>
